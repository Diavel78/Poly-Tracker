<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly-Tracker Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Courier New', monospace;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }

        /* --- Navbar --- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            background: #161b22;
            border-bottom: 1px solid #30363d;
        }
        .navbar h1 { font-size: 18px; color: #e6edf3; }
        .navbar-right { display: flex; align-items: center; gap: 16px; }
        .navbar .status {
            font-size: 12px;
            color: #8b949e;
        }
        .navbar .status.loading { color: #d29922; }
        .navbar .status.error { color: #f85149; }
        .btn-sm {
            padding: 6px 14px;
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-sm:hover { background: #30363d; }
        .btn-refresh { background: #1f6feb; color: #fff; border-color: #1f6feb; }
        .btn-refresh:hover { background: #388bfd; }
        .btn-hide { font-size: 16px; min-width: 36px; text-align: center; }
        .btn-hide.active { background: #30363d; }

        /* --- Hide amounts mode --- */
        body.hide-amounts .amt { visibility: hidden; position: relative; }
        body.hide-amounts .amt::after {
            content: '***';
            visibility: visible;
            position: absolute;
            left: 0;
            right: 0;
        }
        body.hide-amounts .card .amt::after { position: static; }
        body.hide-amounts .card .amt { font-size: inherit; }
        body.hide-amounts td.right .amt::after { text-align: right; }

        /* --- Layout --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

        /* --- Summary cards --- */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
        }
        .card .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
            margin-bottom: 6px;
        }
        .card .value {
            font-size: 22px;
            font-weight: 700;
            color: #e6edf3;
        }
        .card .value.positive { color: #3fb950; }
        .card .value.negative { color: #f85149; }

        /* --- Tabs --- */
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 24px;
            border-bottom: 1px solid #30363d;
        }
        .tab {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            color: #8b949e;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.2s, border-color 0.2s;
        }
        .tab:hover { color: #c9d1d9; }
        .tab.active {
            color: #e6edf3;
            border-bottom-color: #1f6feb;
        }
        .tab-count {
            font-size: 11px;
            background: #21262d;
            color: #8b949e;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* --- Tables --- */
        .section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .section-header {
            padding: 16px 20px;
            border-bottom: 1px solid #30363d;
            font-weight: 600;
            font-size: 15px;
            color: #e6edf3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            text-align: left;
            padding: 10px 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
            border-bottom: 1px solid #30363d;
            background: #0d1117;
        }
        th.right, td.right { text-align: right; }
        td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid #21262d;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #1c2128; }
        .positive { color: #3fb950; }
        .negative { color: #f85149; }
        .side-yes {
            background: #0e4429;
            color: #3fb950;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .side-no {
            background: #3d1f1f;
            color: #f85149;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .empty-state {
            padding: 40px;
            text-align: center;
            color: #8b949e;
            font-size: 14px;
        }

        /* --- Platform badges --- */
        .platform-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.3px;
            padding: 1px 5px;
            border-radius: 3px;
            margin-right: 6px;
            vertical-align: middle;
            text-transform: uppercase;
        }
        .platform-badge.pm {
            background: #1a3a5c;
            color: #58a6ff;
            border: 1px solid #264a6e;
        }
        .platform-badge.kalshi {
            background: #1a3a1a;
            color: #3fb950;
            border: 1px solid #238636;
        }

        /* --- Spinner --- */
        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Bet Slip Modal --- */
        .betslip-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        .betslip-overlay.open { display: flex; }
        .betslip {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            width: 420px;
            max-width: 92vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
        }
        .betslip-header {
            padding: 20px 24px 16px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .betslip-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: #e6edf3;
            letter-spacing: 0.5px;
        }
        .betslip-date {
            font-size: 12px;
            color: #8b949e;
            margin-top: 2px;
        }
        .betslip-close {
            background: none;
            border: none;
            color: #8b949e;
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            line-height: 1;
        }
        .betslip-close:hover { background: #21262d; color: #e6edf3; }
        .betslip-body { padding: 8px 0; }
        .betslip-item {
            padding: 14px 24px;
            border-bottom: 1px solid #161b22;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .betslip-item:last-child { border-bottom: none; }
        .betslip-market {
            font-size: 14px;
            font-weight: 600;
            color: #e6edf3;
            flex: 1;
            min-width: 0;
        }
        .betslip-side {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 3px;
        }
        .betslip-side.yes { color: #3fb950; }
        .betslip-side.no { color: #f85149; }
        .betslip-odds {
            font-size: 16px;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            white-space: nowrap;
            padding: 6px 12px;
            border-radius: 6px;
            background: #161b22;
            border: 1px solid #30363d;
        }
        .betslip-odds.fav { color: #f0883e; }
        .betslip-odds.dog { color: #58a6ff; }
        .betslip-footer {
            padding: 12px 24px 16px;
            border-top: 1px solid #30363d;
            text-align: center;
        }
        .betslip-footer span {
            font-size: 11px;
            color: #484f58;
            letter-spacing: 0.3px;
        }
        .betslip-empty {
            padding: 32px 24px;
            text-align: center;
            color: #8b949e;
            font-size: 14px;
        }
        .btn-betslip {
            background: linear-gradient(135deg, #f0883e, #d29922);
            color: #0d1117;
            border: none;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.3px;
        }
        .btn-betslip:hover {
            background: linear-gradient(135deg, #f4a261, #e3a836);
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .container { padding: 8px; }
            .navbar { padding: 10px 12px; }
            .navbar h1 { font-size: 16px; }
            .cards { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .card { padding: 12px; }
            .card .label { font-size: 10px; }
            .card .value { font-size: 17px; }
            .section { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            table { min-width: 500px; }
            td, th { padding: 8px 8px; font-size: 12px; white-space: nowrap; }
            .tab { padding: 8px 12px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>Poly-Tracker</h1>
        <div class="navbar-right">
            <span class="status" id="status">Loading...</span>
            <button class="btn-sm btn-betslip" onclick="openBetSlip()">Bet Slip</button>
            <button class="btn-sm btn-hide" id="btn-hide" onclick="toggleAmounts()" title="Hide/show dollar amounts">&#x1F441;</button>
            <button class="btn-sm btn-refresh" onclick="loadData()">Refresh</button>
            <a href="/logout" class="btn-sm">Logout</a>
        </div>
    </nav>

    <div class="container">
        <!-- Summary cards -->
        <div class="cards" id="cards">
            <div class="card">
                <div class="label">Balance</div>
                <div class="value" id="card-balance">--</div>
            </div>
            <div class="card">
                <div class="label">Open Positions</div>
                <div class="value" id="card-positions">--</div>
            </div>
            <div class="card">
                <div class="label">Portfolio Value</div>
                <div class="value" id="card-value">--</div>
            </div>
            <div class="card">
                <div class="label">Today's P&L</div>
                <div class="value" id="card-today-pnl">--</div>
            </div>
            <div class="card">
                <div class="label">Yesterday's P&L</div>
                <div class="value" id="card-yesterday-pnl">--</div>
            </div>
            <div class="card">
                <div class="label">Total P&L</div>
                <div class="value" id="card-pnl">--</div>
            </div>
            <div class="card">
                <div class="label">Win Rate</div>
                <div class="value" id="card-winrate">--</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" data-tab="open" onclick="switchTab('open')">
                Open Positions <span class="tab-count" id="open-count">0</span>
            </div>
            <div class="tab" data-tab="closed" onclick="switchTab('closed')">
                Closed Positions <span class="tab-count" id="closed-count">0</span>
            </div>
            <div class="tab" data-tab="activity" onclick="switchTab('activity')">
                All Activity <span class="tab-count" id="activity-count">0</span>
            </div>
        </div>

        <!-- Open Positions tab -->
        <div class="tab-panel active" id="panel-open">
            <div class="section">
                <div id="positions-body">
                    <div class="empty-state"><span class="spinner"></span> Loading positions...</div>
                </div>
            </div>
        </div>

        <!-- Closed Positions tab -->
        <div class="tab-panel" id="panel-closed">
            <div class="section">
                <div id="closed-body">
                    <div class="empty-state"><span class="spinner"></span> Loading...</div>
                </div>
            </div>
        </div>

        <!-- All Activity tab -->
        <div class="tab-panel" id="panel-activity">
            <div class="section">
                <div id="activities-body">
                    <div class="empty-state"><span class="spinner"></span> Loading activity...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bet Slip Modal -->
    <div class="betslip-overlay" id="betslip-overlay" onclick="closeBetSlipOutside(event)">
        <div class="betslip" id="betslip">
            <div class="betslip-header">
                <div>
                    <h2>BET SLIP</h2>
                    <div class="betslip-date" id="betslip-date"></div>
                </div>
                <button class="betslip-close" onclick="closeBetSlip()">&times;</button>
            </div>
            <div class="betslip-body" id="betslip-body">
                <div class="betslip-empty">No open positions</div>
            </div>
            <div class="betslip-footer">
                <span>POLY-TRACKER</span>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);

        let amountsHidden = localStorage.getItem('hideAmounts') === '1';

        function toggleAmounts() {
            amountsHidden = !amountsHidden;
            localStorage.setItem('hideAmounts', amountsHidden ? '1' : '0');
            document.body.classList.toggle('hide-amounts', amountsHidden);
            $('btn-hide').classList.toggle('active', amountsHidden);
        }

        // Apply on load
        if (amountsHidden) {
            document.body.classList.add('hide-amounts');
            $('btn-hide').classList.add('active');
        }

        function fmtRaw(val, prefix) {
            if (val === null || val === undefined) return '--';
            prefix = prefix || '';
            return prefix + val.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        function amt(val, prefix) {
            if (val === null || val === undefined) return '--';
            return `<span class="amt">${fmtRaw(val, prefix)}</span>`;
        }

        function pnlClass(val) {
            if (val === null || val === undefined) return '';
            return val >= 0 ? 'positive' : 'negative';
        }

        function pnlAmt(val) {
            if (val === null || val === undefined) return '--';
            const sign = val >= 0 ? '+' : '';
            return `<span class="amt">${sign}${fmtRaw(val, '$')}</span>`;
        }

        function sideTag(side) {
            if (!side) return '';
            const cls = side === 'YES' ? 'side-yes' : 'side-no';
            return `<span class="${cls}">${side}</span>`;
        }

        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
        }

        function renderCards(data) {
            const s = data.summary;
            const b = data.balances;

            $('card-balance').innerHTML = b.current_balance !== null ? amt(b.current_balance, '$') : '--';
            $('card-positions').textContent = s.total_positions;
            $('card-value').innerHTML = amt(s.total_current, '$');

            const todayEl = $('card-today-pnl');
            todayEl.innerHTML = pnlAmt(s.today_pnl);
            todayEl.className = 'value ' + pnlClass(s.today_pnl);

            const yesterdayEl = $('card-yesterday-pnl');
            yesterdayEl.innerHTML = pnlAmt(s.yesterday_pnl);
            yesterdayEl.className = 'value ' + pnlClass(s.yesterday_pnl);

            const pnlEl = $('card-pnl');
            pnlEl.innerHTML = pnlAmt(s.total_pnl);
            pnlEl.className = 'value ' + pnlClass(s.total_pnl);

            $('card-winrate').textContent = s.win_rate !== null
                ? s.win_rate.toFixed(1) + '%'
                : (s.resolved_total === 0 ? 'N/A' : '--');
        }

        function renderPositions(positions) {
            const el = $('positions-body');
            $('open-count').textContent = positions.length;
            if (!positions.length) {
                el.innerHTML = '<div class="empty-state">No open positions</div>';
                return;
            }
            let html = '<table><thead><tr>' +
                '<th>Market</th>' +
                '<th class="right">Qty</th><th class="right">Entry</th>' +
                '<th class="right">Current</th><th class="right">P&L</th>' +
                '<th class="right">Return</th></tr></thead><tbody>';

            for (const p of positions) {
                html += `<tr>
                    <td>${platformBadge(p.platform)}${esc(p.market_name.replace(/\s+\d{4}-\d{2}-\d{2}$/, ''))}${p.outcome ? ' — ' + esc(p.outcome) : ''}</td>
                    <td class="right">${p.quantity.toFixed(0)}</td>
                    <td class="right">${p.entry_price !== null ? amt(p.entry_price, '$') : '--'}</td>
                    <td class="right">${p.current_price !== null ? amt(p.current_price, '$') : '--'}</td>
                    <td class="right ${pnlClass(p.pnl)}">${pnlAmt(p.pnl)}</td>
                    <td class="right ${pnlClass(p.pnl_pct)}">${p.pnl_pct !== null ? ((p.pnl_pct >= 0 ? '+' : '') + p.pnl_pct.toFixed(1) + '%') : '--'}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            el.innerHTML = html;
        }

        function renderClosed(closed) {
            const el = $('closed-body');
            $('closed-count').textContent = closed.length;
            if (!closed.length) {
                el.innerHTML = '<div class="empty-state">No closed positions yet</div>';
                return;
            }
            let html = '<table><thead><tr>' +
                '<th>Date</th><th>Market</th><th>Result</th>' +
                '<th class="right">Qty</th><th class="right">Entry</th>' +
                '<th class="right">P&L</th></tr></thead><tbody>';

            for (const c of closed) {
                let result = '';
                if (c.type === 'Trade') {
                    result = '<span style="color:#58a6ff">Sold</span>';
                } else if (c.pnl !== null && c.pnl > 0) {
                    result = '<span style="color:#3fb950">W</span>';
                } else if (c.pnl !== null && c.pnl < 0) {
                    result = '<span style="color:#f85149">L</span>';
                } else {
                    result = '<span style="color:#8b949e">Push</span>';
                }
                html += `<tr>
                    <td>${localTime(c.timestamp)}</td>
                    <td>${platformBadge(c.platform)}${esc(c.market)}</td>
                    <td>${result}</td>
                    <td class="right">${c.quantity !== null ? c.quantity.toFixed(0) : '--'}</td>
                    <td class="right">${c.price !== null ? amt(c.price, '$') : '--'}</td>
                    <td class="right ${pnlClass(c.pnl)}">${pnlAmt(c.pnl)}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            el.innerHTML = html;
        }

        function renderActivities(activities) {
            const el = $('activities-body');
            $('activity-count').textContent = activities.length;
            if (!activities.length) {
                el.innerHTML = '<div class="empty-state">No recent activity</div>';
                return;
            }
            let html = '<table><thead><tr>' +
                '<th>Time</th><th>Market</th>' +
                '<th class="right">Qty</th><th class="right">Price</th>' +
                '<th class="right">P&L</th>' +
                '<th>Type</th></tr></thead><tbody>';

            for (const a of activities) {
                html += `<tr>
                    <td>${localTime(a.timestamp)}</td>
                    <td>${platformBadge(a.platform)}${esc(a.market)}</td>
                    <td class="right">${a.quantity !== null ? a.quantity.toFixed(0) : '--'}</td>
                    <td class="right">${a.price !== null ? amt(a.price, '$') : '--'}</td>
                    <td class="right ${pnlClass(a.pnl)}">${pnlAmt(a.pnl)}</td>
                    <td>${esc(a.type)}</td>
                </tr>`;
            }
            html += '</tbody></table>';
            el.innerHTML = html;
        }

        function platformBadge(platform) {
            if (!platform) return '';
            if (platform === 'kalshi') return '<span class="platform-badge kalshi">K</span>';
            return '<span class="platform-badge pm">PM</span>';
        }

        function esc(str) {
            if (!str) return '';
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function localTime(utcStr) {
            // Convert "2026-03-26 03:14:50" (UTC) to local time display
            if (!utcStr) return '';
            try {
                const dt = new Date(utcStr.replace(' ', 'T') + 'Z');
                if (isNaN(dt)) return utcStr;
                return dt.toLocaleString('en-US', {
                    month: 'short', day: 'numeric',
                    hour: 'numeric', minute: '2-digit',
                    hour12: true
                });
            } catch (e) { return utcStr; }
        }

        // --- Bet Slip ---
        let _lastPositions = [];

        function probToAmericanOdds(prob) {
            if (prob === null || prob === undefined || prob <= 0 || prob >= 1) return null;
            if (prob >= 0.5) {
                return -Math.round(prob / (1 - prob) * 100);
            } else {
                return Math.round((1 - prob) / prob * 100);
            }
        }

        function fmtOdds(odds) {
            if (odds === null) return '--';
            return odds > 0 ? '+' + odds : '' + odds;
        }

        function buildBetSlipLabel(p) {
            const title = (p.market_name || '').replace(/\s+\d{4}-\d{2}-\d{2}$/, ''); // strip trailing date
            const pick = p.outcome || '';

            if (!pick || pick === title) {
                return title;
            }
            return title + ' — ' + pick;
        }

        function openBetSlip() {
            const overlay = $('betslip-overlay');
            const body = $('betslip-body');
            const dateEl = $('betslip-date');

            const now = new Date();
            dateEl.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

            if (!_lastPositions.length) {
                body.innerHTML = '<div class="betslip-empty">No open positions</div>';
            } else {
                let html = '';
                for (const p of _lastPositions) {
                    const odds = probToAmericanOdds(p.entry_price);
                    const oddsStr = fmtOdds(odds);
                    const oddsClass = odds !== null ? (odds < 0 ? 'fav' : 'dog') : '';
                    const label = buildBetSlipLabel(p);

                    html += `<div class="betslip-item">
                        <div class="betslip-market">${platformBadge(p.platform)}${esc(label)}</div>
                        <div class="betslip-odds ${oddsClass}">${oddsStr}</div>
                    </div>`;
                }
                body.innerHTML = html;
            }

            overlay.classList.add('open');
        }

        function closeBetSlip() {
            $('betslip-overlay').classList.remove('open');
        }

        function closeBetSlipOutside(e) {
            if (e.target === $('betslip-overlay')) closeBetSlip();
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeBetSlip();
        });

        async function loadData() {
            const statusEl = $('status');
            statusEl.className = 'status loading';
            statusEl.innerHTML = '<span class="spinner"></span> Fetching data...';

            try {
                const tz = new Date().getTimezoneOffset();
                const resp = await fetch('/api/data?tz=' + tz);
                if (resp.status === 401 || resp.status === 302) {
                    window.location.href = '/login';
                    return;
                }
                const data = await resp.json();
                if (!data.ok) throw new Error(data.error || 'API error');

                _lastPositions = data.positions || [];
                renderCards(data);
                renderPositions(data.positions);
                renderClosed(data.closed_positions || []);
                renderActivities(data.activities);

                const ts = new Date(data.timestamp);
                if (data.errors && data.errors.length) {
                    statusEl.className = 'status error';
                    statusEl.textContent = 'Partial data — errors: ' + data.errors.join('; ');
                } else {
                    statusEl.className = 'status';
                    statusEl.textContent = 'Updated ' + ts.toLocaleTimeString();
                }
            } catch (err) {
                statusEl.className = 'status error';
                statusEl.textContent = 'Error: ' + err.message;
            }
        }

        // Load on page load (no auto-refresh — use Refresh button)
        loadData();
    </script>
</body>
</html>
