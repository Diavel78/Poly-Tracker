<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poly-Tracker — Odds Board</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,monospace;background:#0d1117;color:#c9d1d9;min-height:100vh}

        /* Nav */
        .nav{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#161b22;border-bottom:1px solid #30363d}
        .nav-left{display:flex;align-items:center;gap:20px}
        .nav h1{font-size:17px;color:#e6edf3}
        .nav h1 a{color:#e6edf3;text-decoration:none}
        .nav-links{display:flex;gap:4px}
        .nav-link{padding:5px 12px;font-size:12px;font-weight:600;color:#8b949e;text-decoration:none;border-radius:6px;transition:all .15s}
        .nav-link:hover{color:#c9d1d9;background:#21262d}
        .nav-link.active{color:#fff;background:#1f6feb}
        .nav-right{display:flex;align-items:center;gap:10px}
        .status{font-size:11px;color:#8b949e}
        .status.loading{color:#d29922}
        .status.error{color:#f85149}
        .btn-sm{padding:5px 12px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;font-size:12px;cursor:pointer;text-decoration:none}
        .btn-sm:hover{background:#30363d}

        /* Sport bar */
        .sport-bar{display:flex;gap:0;background:#161b22;border-bottom:1px solid #30363d;padding:0 20px;overflow-x:auto}
        .stab{padding:9px 16px;font-size:12px;font-weight:600;color:#8b949e;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
        .stab:hover{color:#c9d1d9}
        .stab.active{color:#e6edf3;border-bottom-color:#1f6feb}

        /* Toolbar */
        .toolbar{display:flex;gap:10px;padding:12px 20px;align-items:center;flex-wrap:wrap;max-width:1400px;margin:0 auto}
        .search-box{background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:6px 12px;color:#c9d1d9;font-size:13px;width:220px;outline:none}
        .search-box:focus{border-color:#1f6feb}
        .search-box::placeholder{color:#484f58}
        .book-pills{display:flex;gap:4px;flex-wrap:wrap;flex:1}
        .bpill{padding:4px 10px;font-size:11px;font-weight:600;border-radius:14px;cursor:pointer;border:1px solid #30363d;background:#21262d;color:#8b949e;transition:all .15s;white-space:nowrap}
        .bpill:hover{color:#c9d1d9;border-color:#8b949e}
        .bpill.on{background:#1f6feb;color:#fff;border-color:#1f6feb}
        .info{font-size:11px;color:#484f58;margin-left:auto;white-space:nowrap}

        /* Board */
        .board{max-width:1400px;margin:0 auto;padding:8px 20px 40px}

        /* Game card — sportsbook style */
        .game{background:#161b22;border:1px solid #30363d;border-radius:8px;margin-bottom:10px;overflow:hidden}
        .game-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}

        /* Best + Books side-by-side layout */
        .best-and-books{display:flex;align-items:stretch}
        .best-col{flex:0 0 auto;min-width:280px;border-right:2px solid #1f6feb33}
        .best-col .gtable th{background:#0d1117}
        .best-col .gtable th:first-child{padding-left:14px}
        .best-td{position:relative;padding:6px 8px !important;text-align:center;vertical-align:middle}
        .best-book{display:block;font-size:9px;font-weight:600;color:#1f6feb;margin-top:1px}
        .books-col{flex:1;min-width:0;overflow:hidden}
        .ghdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;font-size:11px;color:#8b949e;border-bottom:1px solid #21262d}
        .ghdr .gt{font-weight:600;color:#58a6ff}
        .ghdr.live{border-left:3px solid #3fb950}
        .live-badge{font-size:9px;font-weight:700;color:#3fb950;background:#3fb95022;padding:2px 6px;border-radius:3px;margin-right:6px;animation:live-pulse 1.5s infinite}
        @keyframes live-pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .score-display{font-size:16px;font-weight:700;color:#e6edf3;margin:0 8px;letter-spacing:1px}
        .score-display .score-away{color:#e6edf3}
        .score-display .score-sep{color:#484f58;margin:0 4px}
        .score-display .score-home{color:#e6edf3}
        .game-status{font-size:10px;color:#8b949e;margin-left:6px}

        .gtable{width:100%;border-collapse:collapse}
        .gtable th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#484f58;padding:4px 6px;background:#0d1117;border-bottom:1px solid #21262d;text-align:center}
        .gtable th:first-child{text-align:left;padding-left:14px;width:30%}
        .gtable th.mkt-group{border-left:1px solid #30363d}

        .gtable td{padding:0;border-bottom:1px solid #21262d;text-align:center;vertical-align:middle}
        .gtable tr:last-child td{border-bottom:none}
        .gtable td:first-child{text-align:left;padding:8px 14px;font-size:13px;font-weight:600;color:#e6edf3}
        .gtable td.mkt-group{border-left:1px solid #30363d}

        .oc{padding:6px 4px;font-size:13px;font-weight:700;min-width:58px;display:inline-block}
        .oc .pt{display:block;font-size:10px;font-weight:400;color:#8b949e;margin-bottom:1px}
        .oc.fav{color:#f0883e}
        .oc.dog{color:#58a6ff}
        .oc.even{color:#c9d1d9}
        .oc.na{color:#484f58;font-weight:400;font-size:11px}

        /* Deep link icon */
        .dlink{font-size:10px;color:#484f58;text-decoration:none;margin-left:4px}
        .dlink:hover{color:#58a6ff}

        /* Splits bar */
        .splits{display:flex;gap:12px;padding:8px 14px;background:#0d1117;border-top:1px solid #f0883e33;flex-wrap:wrap;align-items:center}
        .splits-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#f0883e;margin-right:4px}
        .split-item{display:flex;align-items:center;gap:6px;font-size:11px}
        .split-item .sname{color:#8b949e;font-weight:500}
        .split-bar{display:flex;height:6px;width:80px;border-radius:3px;overflow:hidden;background:#21262d}
        .split-fill-h{background:#f0883e;height:100%}
        .split-fill-t{background:#58a6ff;height:100%}
        .split-pct{font-weight:700;font-size:10px;min-width:28px;text-align:right}
        .split-pct.sharp{color:#f0883e}
        .split-pct.public{color:#58a6ff}
        .split-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-left:4px}
        .split-tag.sharp-signal{background:#f0883e22;color:#f0883e;border:1px solid #f0883e44}
        .rlm-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;background:#f8514922;color:#f85149;border:1px solid #f8514944;margin-left:8px;animation:rlm-pulse 2s infinite}
        @keyframes rlm-pulse{0%,100%{opacity:1}50%{opacity:.6}}

        .empty-state{text-align:center;padding:60px 24px;color:#484f58;font-size:14px}
        .spinner{display:inline-block;width:14px;height:14px;border:2px solid #30363d;border-top-color:#58a6ff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
        @keyframes spin{to{transform:rotate(360deg)}}

        @media(max-width:768px){
            .nav{padding:10px 12px}
            .nav h1{font-size:15px}
            .toolbar{padding:8px 12px}
            .search-box{width:160px}
            .board{padding:6px 12px 40px}
            .gtable th,.oc{font-size:11px}
            .gtable td:first-child{font-size:12px;padding:6px 10px}
            .oc{min-width:48px;padding:4px 2px}
            .best-and-books{flex-direction:column}
            .best-col{min-width:100%;border-right:none;border-bottom:2px solid #1f6feb33}
            .books-col{width:100%}
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-left">
            <h1><a href="/">Poly-Tracker</a></h1>
            <div class="nav-links">
                <a href="/" class="nav-link active">Odds</a>
                <a href="/dashboard" class="nav-link">Dashboard</a>
            </div>
        </div>
        <div class="nav-right">
            <span class="status" id="status">Loading...</span>
            <a href="/logout" class="btn-sm">Logout</a>
        </div>
    </nav>

    <div class="sport-bar" id="sport-bar"></div>

    <div class="toolbar">
        <input class="search-box" id="search" type="text" placeholder="Search team or matchup..." oninput="renderBoard()">
        <div class="book-pills" id="book-pills"></div>
        <span class="info" id="info"></span>
    </div>

    <div class="board" id="board">
        <div class="empty-state"><span class="spinner"></span> Loading odds...</div>
    </div>

    <script>
    const $ = id => document.getElementById(id);
    const SPORTS = ['mlb','nba','nhl','nfl','ncaab','mma','soccer','tennis'];
    const SL = {mlb:'MLB',nba:'NBA',nhl:'NHL',nfl:'NFL',ncaab:'NCAAB',ncaaf:'NCAAF',mma:'MMA',soccer:'Soccer',tennis:'Tennis'};
    const BL = {pinnacle:'PIN',fanduel:'FD',draftkings:'DK',betmgm:'MGM',caesars:'CZR',bet365:'365',polymarket:'POLY',kalshi:'KAL',novig:'NOV','1xbet':'1X',betonline:'BOL',circa:'CIR',south_point:'SP',westgate:'WG',wynn:'WYN',stations:'STN',hardrock:'HR'};
    const BL_FULL = {pinnacle:'Pinnacle',fanduel:'FanDuel',draftkings:'DraftKings',betmgm:'BetMGM',caesars:'Caesars',bet365:'Bet365',polymarket:'Polymarket',kalshi:'Kalshi',novig:'Novig','1xbet':'1xBet',betonline:'BetOnline',circa:'Circa',south_point:'South Point',westgate:'Westgate',wynn:'Wynn',stations:'Stations',hardrock:'Hard Rock'};

    let activeSport = localStorage.getItem('odds_sport') || 'mlb';
    let oddsData = {events:[], books:[]};
    const DEFAULT_BOOKS = ['fanduel','draftkings','betmgm','pinnacle','caesars'];
    let enabledBooks = new Set(JSON.parse(localStorage.getItem('odds_books') || 'null') || DEFAULT_BOOKS);

    // Filter out minor/college games for major league tabs.
    // Only strict-filter for sports where we KNOW the league name.
    // NCAAB/NCAAF/MMA/soccer/tennis pass through unfiltered.
    const LEAGUE_FILTER = {
        mlb: ['MLB'],
        nba: ['NBA'],
        nhl: ['NHL'],
        nfl: ['NFL'],
    };

    function esc(s){if(!s)return '';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
    function fmt(p){if(p==null)return '--';return p>0?'+'+p:''+p}
    function cls(p){if(p==null)return 'na';if(p<-130)return 'fav';if(p>130)return 'dog';return 'even'}

    function localTime(s){
        if(!s)return '';
        try{const d=new Date(s);if(isNaN(d))return '';return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}catch{return ''}
    }
    function localDate(s){
        if(!s)return '';
        try{const d=new Date(s);if(isNaN(d))return '';return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}catch{return ''}
    }

    function renderSportBar(){
        let h='';
        for(const s of SPORTS) h+=`<div class="stab ${s===activeSport?'active':''}" onclick="setSport('${s}')">${SL[s]||s.toUpperCase()}</div>`;
        $('sport-bar').innerHTML=h;
    }

    function renderBookPills(){
        const books = oddsData.books||[];
        let h='';
        for(const b of books){
            const on = enabledBooks.has(b);
            h+=`<span class="bpill ${on?'on':''}" onclick="toggleBook('${b}')" title="${esc(BL_FULL[b]||b)}">${esc(BL[b]||b)}</span>`;
        }
        $('book-pills').innerHTML=h;
    }

    function toggleBook(b){
        if(enabledBooks.has(b)) enabledBooks.delete(b); else enabledBooks.add(b);
        localStorage.setItem('odds_books', JSON.stringify([...enabledBooks]));
        renderBookPills();
        renderBoard();
    }

    function getBooks(){
        const all = oddsData.books||[];
        return all.filter(b=>enabledBooks.has(b));
    }

    function renderSplitsRow(circa, dk, label, mktKey, awayName, homeName) {
        // Prefer Circa, fall back to DK
        const src = circa?.[mktKey] || dk?.[mktKey];
        if (!src) return '';
        const srcLabel = circa?.[mktKey] ? 'Circa' : 'DK';

        let awayH, awayT, homeH, homeT;

        if (mktKey === 'total') {
            // Totals use over/under instead of away/home
            awayH = src.over_handle_pct;
            awayT = src.over_bets_pct;
            homeH = src.under_handle_pct;
            homeT = src.under_bets_pct;
        } else {
            awayH = src.away_handle_pct;
            awayT = src.away_bets_pct;
            homeH = src.home_handle_pct;
            homeT = src.home_bets_pct;
        }

        if (awayH == null && awayT == null) return '';

        // Sharp signal: money diverges from bets by 15%+
        const awayDiv = (awayH != null && awayT != null) ? awayH - awayT : 0;
        const homeDiv = (homeH != null && homeT != null) ? homeH - homeT : 0;
        const maxDiv = Math.max(Math.abs(awayDiv), Math.abs(homeDiv));
        const isSharp = maxDiv >= 15;
        const sharpSide = Math.abs(awayDiv) > Math.abs(homeDiv)
            ? (awayDiv > 0 ? awayName : homeName)
            : (homeDiv > 0 ? homeName : awayName);

        let h = `<div class="split-item">`;
        h += `<span class="sname">${label}</span>`;

        // Away/Over side
        h += `<span style="font-size:10px;color:#8b949e;min-width:30px">${esc(awayName.substring(0,3).toUpperCase())}</span>`;
        if (awayH != null) {
            h += `<div class="split-bar"><div class="split-fill-h" style="width:${awayH}%"></div></div>`;
            h += `<span class="split-pct sharp">${awayH}%</span>`;
            h += `<span style="font-size:9px;color:#484f58">/</span>`;
            h += `<span class="split-pct public">${awayT != null ? awayT + '%' : '--'}</span>`;
        }

        if (isSharp) {
            h += `<span class="split-tag sharp-signal">SHARP ${esc(sharpSide.substring(0,3).toUpperCase())}</span>`;
        }

        h += `<span style="font-size:9px;color:#484f58;margin-left:4px">${srcLabel}</span>`;
        h += `</div>`;
        return h;
    }

    function renderMovement(mv, label, mktKey, awayName, homeName) {
        const data = mv[mktKey] || {};
        const awayData = data[awayName];
        if (!awayData) return '';

        let h = `<div class="split-item"><span class="sname">${label}</span>`;

        if (mktKey === 'ml') {
            const diff = awayData.diff;
            const arrow = diff > 0 ? '&#9650;' : diff < 0 ? '&#9660;' : '';
            const color = diff > 0 ? '#3fb950' : diff < 0 ? '#f85149' : '#8b949e';
            h += `<span style="font-size:10px;color:#8b949e">${esc(awayName.substring(0,3).toUpperCase())}</span>`;
            h += `<span style="font-size:11px;color:#8b949e">${fmt(awayData.open)}</span>`;
            h += `<span style="font-size:10px;color:${color};margin:0 2px">${arrow}</span>`;
            h += `<span style="font-size:11px;font-weight:700;color:${color}">${fmt(awayData.current)}</span>`;
            if (diff !== 0) h += `<span style="font-size:9px;color:${color};margin-left:2px">(${diff > 0 ? '+' : ''}${diff})</span>`;
        } else if (mktKey === 'spread') {
            const ptDiff = awayData.point_diff;
            const pxDiff = awayData.price_diff;
            const changed = ptDiff !== 0 || pxDiff !== 0;
            const color = changed ? '#d29922' : '#8b949e';
            const pt = awayData.current_point;
            const ptStr = pt > 0 ? '+' + pt : '' + pt;
            h += `<span style="font-size:10px;color:#8b949e">${esc(awayName.substring(0,3).toUpperCase())}</span>`;
            h += `<span style="font-size:11px;color:${color};font-weight:${changed?700:400}">${ptStr} ${fmt(awayData.current_price)}</span>`;
            if (ptDiff !== 0) h += `<span style="font-size:9px;color:${color};margin-left:2px">(${ptDiff > 0 ? '+' : ''}${ptDiff})</span>`;
        } else if (mktKey === 'total') {
            const ptDiff = awayData.point_diff;
            const changed = ptDiff !== 0 || awayData.price_diff !== 0;
            const color = changed ? '#d29922' : '#8b949e';
            h += `<span style="font-size:11px;color:${color};font-weight:${changed?700:400}">O ${awayData.current_point} ${fmt(awayData.current_price)}</span>`;
            if (ptDiff !== 0) h += `<span style="font-size:9px;color:${color};margin-left:2px">(${ptDiff > 0 ? '+' : ''}${ptDiff})</span>`;
        }

        h += `</div>`;
        return h;
    }

    // Find best odds across all enabled books for each market/side
    function findBestOdds(ev, books, away, home) {
        const result = {
            ml_away: null, ml_home: null,
            spr_away: null, spr_home: null,
            tot_over: null, tot_under: null,
        };

        for (const bk of books) {
            const bd = (ev.books || {})[bk];
            if (!bd) continue;
            const label = BL[bk] || bk;

            // ML: higher price = better for bettor
            const mla = bd.moneyline?.[away];
            if (mla != null && (result.ml_away == null || mla > result.ml_away.price))
                result.ml_away = { price: mla, book: label };

            const mlh = bd.moneyline?.[home];
            if (mlh != null && (result.ml_home == null || mlh > result.ml_home.price))
                result.ml_home = { price: mlh, book: label };

            // Spread: higher price at same point = better; more favorable point = better
            const spa = bd.spread?.[away];
            if (spa?.price != null) {
                if (result.spr_away == null ||
                    spa.point > result.spr_away.point ||
                    (spa.point === result.spr_away.point && spa.price > result.spr_away.price))
                    result.spr_away = { price: spa.price, point: spa.point, book: label };
            }

            const sph = bd.spread?.[home];
            if (sph?.price != null) {
                if (result.spr_home == null ||
                    sph.point > result.spr_home.point ||
                    (sph.point === result.spr_home.point && sph.price > result.spr_home.price))
                    result.spr_home = { price: sph.price, point: sph.point, book: label };
            }

            // Total: higher price at same point = better
            const tov = bd.total?.['Over'];
            if (tov?.price != null) {
                if (result.tot_over == null ||
                    (tov.point === result.tot_over.point && tov.price > result.tot_over.price) ||
                    (tov.point < result.tot_over.point))
                    result.tot_over = { price: tov.price, point: tov.point, book: label };
            }

            const tun = bd.total?.['Under'];
            if (tun?.price != null) {
                if (result.tot_under == null ||
                    (tun.point === result.tot_under.point && tun.price > result.tot_under.price) ||
                    (tun.point > result.tot_under.point))
                    result.tot_under = { price: tun.price, point: tun.point, book: label };
            }
        }
        return result;
    }

    function bestCell(b) {
        if (!b) return `<td class="best-td"><span class="oc na">--</span></td>`;
        return `<td class="best-td"><span class="oc ${cls(b.price)}">${fmt(b.price)}</span><span class="best-book">${esc(b.book)}</span></td>`;
    }

    function bestCellPt(b, prefix) {
        if (!b) return `<td class="best-td"><span class="oc na">--</span></td>`;
        const ptStr = prefix
            ? `${prefix} ${b.point}`
            : (b.point > 0 ? '+' + b.point : '' + b.point);
        return `<td class="best-td"><span class="oc ${cls(b.price)}"><span class="pt">${ptStr}</span>${fmt(b.price)}</span><span class="best-book">${esc(b.book)}</span></td>`;
    }

    function hasAnyOdds(ev, books) {
        for (const bk of books) {
            const bd = (ev.books || {})[bk];
            if (!bd) continue;
            if (Object.keys(bd.moneyline || {}).length) return true;
            if (Object.keys(bd.spread || {}).length) return true;
            if (Object.keys(bd.total || {}).length) return true;
        }
        return false;
    }

    function renderBoard(){
        const board=$('board');
        const query=($('search').value||'').toLowerCase().trim();
        let events=(oddsData.events||[]);
        const books=getBooks();

        // Filter by league (e.g., only "MLB" games on MLB tab, not minor/college)
        const leagueFilter = LEAGUE_FILTER[activeSport];
        if (leagueFilter) {
            events = events.filter(e => leagueFilter.includes(e.league));
        }

        // Filter by search
        if (query) events = events.filter(e => (e.home_team + ' ' + e.away_team).toLowerCase().includes(query));

        // Hide games with zero odds across all enabled books
        events = events.filter(e => hasAnyOdds(e, books));

        if(!events.length){
            const msg=oddsData.meta_message?esc(oddsData.meta_message):'No games found';
            board.innerHTML=`<div class="empty-state">${query?'No matches for "'+esc(query)+'"':msg}</div>`;
            $('info').textContent='';
            return;
        }
        $('info').textContent=events.length+' games';

        let h='';
        for(const ev of events){
            const home=ev.home_team||'';
            const away=ev.away_team||'';
            const time=localTime(ev.commence_time);
            const date=localDate(ev.commence_time);
            const league=ev.league?esc(ev.league)+' · ':'';
            const best = findBestOdds(ev, books, away, home);

            const sc = ev.score;
            const isLive = sc && sc.live;
            const liveClass = isLive ? ' live' : '';

            h+=`<div class="game"><div class="ghdr${liveClass}">`;
            if (isLive) {
                h+=`<span><span class="live-badge">LIVE</span>${league}${esc(away)}`;
                h+=` <span class="score-display"><span class="score-away">${sc.away_score ?? '-'}</span>`;
                h+=`<span class="score-sep">-</span>`;
                h+=`<span class="score-home">${sc.home_score ?? '-'}</span></span> `;
                h+=`${esc(home)}`;
                if (sc.period || sc.clock) h+=`<span class="game-status">${esc(sc.period)}${sc.clock ? ' ' + esc(sc.clock) : ''}</span>`;
                h+=`</span>`;
            } else {
                h+=`<span>${league}${esc(away)} @ ${esc(home)}</span>`;
            }
            h+=`<span class="gt">${esc(date)} ${esc(time)}</span></div>`;

            // === BEST ODDS (left, always visible) ===
            h+=`<div class="best-and-books">`;
            h+=`<div class="best-col">`;
            h+=`<table class="gtable"><thead><tr><th>Team</th><th>ML</th><th>Spread</th><th>Total</th></tr></thead><tbody>`;

            // Away row
            h+=`<tr><td>${esc(away)}</td>`;
            h+=bestCell(best.ml_away);
            h+=bestCellPt(best.spr_away);
            h+=bestCellPt(best.tot_over, 'O');
            h+=`</tr>`;

            // Home row
            h+=`<tr><td>${esc(home)}</td>`;
            h+=bestCell(best.ml_home);
            h+=bestCellPt(best.spr_home);
            h+=bestCellPt(best.tot_under, 'U');
            h+=`</tr></tbody></table>`;

            // Pinnacle movement + Reverse line
            const mv = ev.pinnacle_movement || {};
            const rlm = ev.reverse_line || {};
            const hasMv = Object.keys(mv.ml||{}).length || Object.keys(mv.spread||{}).length;
            const splits = ev.splits || {};
            const circa = splits.circa;
            const dk = splits.draftkings;

            if (hasMv || circa || dk || Object.keys(rlm).length) {
                h += `<div class="splits">`;

                // Pinnacle movement
                if (hasMv) {
                    h += `<span class="splits-label">PIN</span>`;
                    h += renderMovement(mv, 'ML', 'ml', away, home);
                    h += renderMovement(mv, 'SPR', 'spread', away, home);
                    h += renderMovement(mv, 'TOT', 'total', 'Over', 'Under');
                }

                // Reverse line flag
                if (rlm.ml) {
                    h += `<span class="rlm-tag">RLM ${esc(rlm.ml.side.substring(0,3).toUpperCase())}</span>`;
                }

                h += `</div>`;

                // Splits on separate row
                if (circa || dk) {
                    h += `<div class="splits"><span class="splits-label">Splits</span>`;
                    h += renderSplitsRow(circa, dk, 'ML', 'moneyline', away, home);
                    h += renderSplitsRow(circa, dk, 'SPR', 'spread', away, home);
                    h += renderSplitsRow(circa, dk, 'TOT', 'total', 'Over', 'Under');
                    h += `</div>`;
                }
            }

            h+=`</div>`;

            // === ALL BOOKS (scrollable right) ===
            h+=`<div class="books-col"><div class="game-scroll"><table class="gtable"><thead><tr>`;
            for(const bk of books){
                const link=(ev.books||{})[bk]?.event_link;
                const label=esc(BL[bk]||bk);
                const linkHtml=link?` <a class="dlink" href="${esc(link)}" target="_blank">&#8599;</a>`:'';
                h+=`<th class="mkt-group" colspan="3">${label}${linkHtml}</th>`;
            }
            h+=`</tr><tr>`;
            for(const bk of books){
                h+=`<th class="mkt-group">ML</th><th>SPR</th><th>TOT</th>`;
            }
            h+=`</tr></thead><tbody>`;

            // Away row
            h+=`<tr>`;
            for(const bk of books){
                const bd=(ev.books||{})[bk]||{};
                const ml=bd.moneyline?.[away];
                h+=`<td class="mkt-group"><span class="oc ${ml!=null?cls(ml):'na'}">${fmt(ml)}</span></td>`;
                const sp=bd.spread?.[away];
                if(sp){h+=`<td><span class="oc ${cls(sp.price)}"><span class="pt">${sp.point>0?'+'+sp.point:sp.point}</span>${fmt(sp.price)}</span></td>`}
                else{h+=`<td><span class="oc na">--</span></td>`}
                const tot=bd.total?.['Over'];
                if(tot){h+=`<td><span class="oc ${cls(tot.price)}"><span class="pt">O ${tot.point}</span>${fmt(tot.price)}</span></td>`}
                else{h+=`<td><span class="oc na">--</span></td>`}
            }
            h+=`</tr>`;

            // Home row
            h+=`<tr>`;
            for(const bk of books){
                const bd=(ev.books||{})[bk]||{};
                const ml=bd.moneyline?.[home];
                h+=`<td class="mkt-group"><span class="oc ${ml!=null?cls(ml):'na'}">${fmt(ml)}</span></td>`;
                const sp=bd.spread?.[home];
                if(sp){h+=`<td><span class="oc ${cls(sp.price)}"><span class="pt">${sp.point>0?'+'+sp.point:sp.point}</span>${fmt(sp.price)}</span></td>`}
                else{h+=`<td><span class="oc na">--</span></td>`}
                const tot=bd.total?.['Under'];
                if(tot){h+=`<td><span class="oc ${cls(tot.price)}"><span class="pt">U ${tot.point}</span>${fmt(tot.price)}</span></td>`}
                else{h+=`<td><span class="oc na">--</span></td>`}
            }
            h+=`</tr></tbody></table></div></div>`;

            h+=`</div></div>`;
        }
        board.innerHTML=h;
    }

    async function loadOdds(){
        const status=$('status');
        status.textContent='Loading...';
        status.className='status loading';
        try{
            const resp=await fetch(`/api/odds?sport=${activeSport}`);
            const data=await resp.json();
            if(!data.ok){
                status.textContent=data.error||'Error';
                status.className='status error';
                $('board').innerHTML=`<div class="empty-state">${esc(data.error||'API error')}</div>`;
                return;
            }
            oddsData=data;
            const now=new Date();
            const ct=data.cached?' (cached)':'';
            status.textContent=`${(data.events||[]).length} games · ${now.toLocaleTimeString()}${ct}`;
            status.className='status';
            renderBookPills();
            renderBoard();
        }catch(err){
            status.textContent='Fetch error';
            status.className='status error';
            console.error(err);
        }
    }

    function setSport(s){
        activeSport=s;
        localStorage.setItem('odds_sport',s);
        renderSportBar();
        loadOdds();
    }

    renderSportBar();
    loadOdds();
    setInterval(loadOdds,10000); // refresh every 10 seconds — MVP plan supports it
    </script>
</body>
</html>
